recipe_version: "1"
name: Qwen3.6-27B-Base-LoRA-Attn-MLP-Liger
description: Same as attn-mlp but with Liger fused linear cross-entropy (avoids materializing the full vocab×seq logits tensor — the largest activation transient at long context on a 150k+ vocab model) plus PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True (reduces fragmentation in the GB10 unified-memory allocator). Aim: keep seq=8192 viable on 4-node GB10 without dying after step 2.
base_model: Qwen/Qwen3.6-27B
framework: deepspeed
method: lora
dataset_format: sharegpt

container:
  image: nvcr.io/nvidia/pytorch:25.11-py3
  name: dgx-finetune

scripts:
  entrypoint: entrypoint.sh
  train: train.py
  launch: launch.sh
  ds_config: ds_config.json
  # Reuses the 35B-A3B merge script: its Case 1 path
  # (compute_delta with base_tensor.ndim == 2) handles dense 2D LoRA on
  # q/k/v/o_proj. The MoE 3D path is silently skipped for dense models.
  # We don't use scripts/merge.py because it relies on PEFT's
  # merge_and_unload(), which strips Qwen 3.6's multimodal wrapper and
  # produces a model_type=qwen3_5_text leaf config that vLLM can't load.
  merge: scripts/merge_qwen3moe.py

defaults:
  learning_rate: 0.0002
  batch_size: 1
  gradient_accumulation_steps: 4
  max_seq_length: 256
  num_train_epochs: 1
  max_steps: -1
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  # Frequent checkpointing: a long-context build123d run on 2 nodes hard-
  # locked the cluster between the final training step and adapter save
  # (suspected: ZeRO-3 weight gather on save + already-resident eval
  # activations exceeding the 122 GB unified memory ceiling). With
  # save_steps=50 we always have a recent checkpoint to recover from
  # even if end-of-training save crashes the system.
  save_steps: 50
  save_total_limit: 3
  # Attention projections + MLP gates. The dense 27B's MLP block is
  # SwiGLU-style with gate_proj/up_proj/down_proj on the full-attn
  # layers; targeting them ~triples LoRA capacity vs attention-only
  # (10.5M → ~30M trainable params), giving headroom for novel-domain
  # tasks (DSL code-gen, domain knowledge injection).
  #
  # GatedDeltaNet (linear-attn) layers don't expose gate_proj/up_proj/
  # down_proj — they use in_proj/out_proj — so suffix matching still
  # automatically skips them. Same safety as the q/k/v/o_proj match.
  lora_target_modules: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
  seed: 42
  # 10% eval (vs the attn-only sibling's 5%): this variant targets novel
  # domains (DSL code-gen) where training-quality is harder to read from a
  # noisy 5% holdout. On a typical 1-2k-example domain dataset, 10% gives
  # a meaningful eval-loss signal without sacrificing too much train data.
  eval_fraction: 0.10

hardware:
  # 4 nodes recommended for novel-domain long-context training: at
  # eff_batch=8 (4 nodes × grad_accum=2 × bs=1) per-step time halves
  # vs 2 nodes (eff_batch=8 via 2 × grad_accum=4) at the same gradient
  # quality. Memory headroom also better: weight shard 27 GB → 13.5 GB.
  # Note: dashboard training UI uses min_nodes as the exact count (no
  # picker yet), so this is also the de-facto fixed node count when
  # launched via the dashboard.
  min_nodes: 4
  gpus_per_node: 1
  vram_estimate_mb: 40960

deploy:
  container: vllm-node
  gpu_memory_utilization: 0.85
  max_model_len: 4096
