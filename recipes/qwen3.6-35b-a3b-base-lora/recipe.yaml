recipe_version: "1"
name: Qwen3.6-35B-A3B-Base-LoRA
description: LoRA fine-tune for Qwen 3.6-35B-A3B BASE (hybrid Mamba+attn MoE, 256 experts / 8 active) on DGX Spark
base_model: Qwen/Qwen3.6-35B-A3B
framework: deepspeed
method: lora
dataset_format: sharegpt

container:
  image: nvcr.io/nvidia/pytorch:25.11-py3
  name: dgx-finetune

scripts:
  entrypoint: entrypoint.sh
  train: train.py
  launch: launch.sh
  ds_config: ds_config.json
  # Qwen 3.6 needs hand-rolled per-expert LoRA composition because the
  # generic PEFT merge_and_unload strips the multimodal wrapper and
  # produces a model vLLM can't load.
  merge: scripts/merge_qwen3moe.py

defaults:
  learning_rate: 0.0002
  batch_size: 1
  gradient_accumulation_steps: 4
  max_seq_length: 256
  num_train_epochs: 1
  max_steps: -1
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  # Attention projections only (not Mamba/linear-attention layers — those are
  # stateful and not LoRA-friendly). MoE expert tensors targeted via
  # target_parameters in train.py.
  lora_target_modules: q_proj,k_proj,v_proj,o_proj
  seed: 42
  eval_fraction: 0.05

hardware:
  min_nodes: 3
  gpus_per_node: 1
  vram_estimate_mb: 49152

deploy:
  container: vllm-node
  gpu_memory_utilization: 0.85
  max_model_len: 4096
