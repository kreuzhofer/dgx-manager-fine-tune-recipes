recipe_version: "1"
name: Gemma-4-E2B-Unsloth-QLoRA
description: QLoRA fine-tune for Gemma 4 E2B via Unsloth (2x faster, 60% less memory)
base_model: google/gemma-4-e2b
framework: unsloth
method: lora
dataset_format: sharegpt

container:
  image: dgx-spark-unsloth:latest
  build_context: /mnt/tank/src/github/dgx-spark-unsloth
  name: dgx-finetune-unsloth

scripts:
  entrypoint: entrypoint.sh
  train: train.py
  launch: launch.sh

defaults:
  learning_rate: 0.0002
  batch_size: 2
  gradient_accumulation_steps: 4
  max_seq_length: 2048
  num_train_epochs: 1
  max_steps: -1
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  lora_target_modules: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
  load_in_4bit: true
  seed: 42
  eval_fraction: 0.1

hardware:
  min_nodes: 1
  gpus_per_node: 1
  vram_estimate_mb: 12288
