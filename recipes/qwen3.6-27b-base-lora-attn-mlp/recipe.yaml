recipe_version: "1"
name: Qwen3.6-27B-Base-LoRA-Attn-MLP
description: LoRA fine-tune for Qwen 3.6-27B BASE — attention + MLP targets (~3× capacity vs the attn-only sibling), for novel-domain tasks like DSL code generation
base_model: Qwen/Qwen3.6-27B
framework: deepspeed
method: lora
dataset_format: sharegpt

container:
  image: nvcr.io/nvidia/pytorch:25.11-py3
  name: dgx-finetune

scripts:
  entrypoint: entrypoint.sh
  train: train.py
  launch: launch.sh
  ds_config: ds_config.json
  # Reuses the 35B-A3B merge script: its Case 1 path
  # (compute_delta with base_tensor.ndim == 2) handles dense 2D LoRA on
  # q/k/v/o_proj. The MoE 3D path is silently skipped for dense models.
  # We don't use scripts/merge.py because it relies on PEFT's
  # merge_and_unload(), which strips Qwen 3.6's multimodal wrapper and
  # produces a model_type=qwen3_5_text leaf config that vLLM can't load.
  merge: scripts/merge_qwen3moe.py

defaults:
  learning_rate: 0.0002
  batch_size: 1
  gradient_accumulation_steps: 4
  max_seq_length: 256
  num_train_epochs: 1
  max_steps: -1
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  # Attention projections + MLP gates. The dense 27B's MLP block is
  # SwiGLU-style with gate_proj/up_proj/down_proj on the full-attn
  # layers; targeting them ~triples LoRA capacity vs attention-only
  # (10.5M → ~30M trainable params), giving headroom for novel-domain
  # tasks (DSL code-gen, domain knowledge injection).
  #
  # GatedDeltaNet (linear-attn) layers don't expose gate_proj/up_proj/
  # down_proj — they use in_proj/out_proj — so suffix matching still
  # automatically skips them. Same safety as the q/k/v/o_proj match.
  lora_target_modules: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
  seed: 42
  eval_fraction: 0.05

hardware:
  min_nodes: 2
  gpus_per_node: 1
  vram_estimate_mb: 40960   # provisional; refined after phase c measures peak rss

deploy:
  container: vllm-node
  gpu_memory_utilization: 0.85
  max_model_len: 4096
