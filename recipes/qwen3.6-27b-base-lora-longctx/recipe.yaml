recipe_version: "1"
name: Qwen3.6-27B-Base-LoRA-LongCtx
description: LoRA fine-tune for Qwen 3.6-27B BASE — attention-only target, long-context safety (save_steps=50, no full-weight gather on save). Use for 4k-8k+ token training where end-of-training save+eval can OOM the 122 GB unified memory.
base_model: Qwen/Qwen3.6-27B
framework: deepspeed
method: lora
dataset_format: sharegpt

container:
  image: nvcr.io/nvidia/pytorch:25.11-py3
  name: dgx-finetune

scripts:
  entrypoint: entrypoint.sh
  train: train.py
  launch: launch.sh
  ds_config: ds_config.json
  # Reuses the 35B-A3B merge script: its Case 1 path
  # (compute_delta with base_tensor.ndim == 2) handles dense 2D LoRA on
  # q/k/v/o_proj. The MoE 3D path is silently skipped for dense models.
  # We don't use scripts/merge.py because it relies on PEFT's
  # merge_and_unload(), which strips Qwen 3.6's multimodal wrapper and
  # produces a model_type=qwen3_5_text leaf config that vLLM can't load.
  merge: scripts/merge_qwen3moe.py

defaults:
  learning_rate: 0.0002
  batch_size: 1
  gradient_accumulation_steps: 4
  max_seq_length: 256
  num_train_epochs: 1
  max_steps: -1
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  # Attention projections only. GatedDeltaNet (linear-attention) layers are
  # stateful and not LoRA-friendly — same rule as the 35B-A3B Mamba layers.
  # Static check (Task 1) confirmed q_proj only appears on full-attn
  # layers (16 of 64: indices [3,7,11,15,19,23,27,31,35,39,43,47,51,55,59,63]),
  # so suffix matching is safe — no layers_to_transform needed.
  lora_target_modules: q_proj,k_proj,v_proj,o_proj
  seed: 42
  eval_fraction: 0.05
  # Frequent checkpointing for long-context: see qwen3.6-27b-base-lora-
  # attn-mlp recipe for the same rationale (build123d 8192-tok run hard-
  # locked the cluster between final step and adapter save).
  save_steps: 50
  save_total_limit: 3

hardware:
  # 4 nodes recommended for long-context (4-8k+) training — see attn-mlp
  # sibling for rationale (better per-step time, more memory headroom).
  min_nodes: 4
  gpus_per_node: 1
  vram_estimate_mb: 40960

deploy:
  container: vllm-node
  gpu_memory_utilization: 0.85
  max_model_len: 4096
